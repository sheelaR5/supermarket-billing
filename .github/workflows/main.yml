name: Supermarket Billing CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      
      - name: Create PEM File
        run: |
          echo "${{ secrets.sheelaa_key }}" > sheela-key.pem
          chmod 400 sheela-key.pem

      
      - name: Copy Project to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i sheela-key.pem -r * ec2-user@3.93.59.115:/home/ec2-user/supermarket-billing

      
      - name: Run Application
        run: |
          ssh -o StrictHostKeyChecking=no -i sheela-key.pem ec2-user@3.93.59.115 << 'EOF'
            cd /home/ec2-user/supermarket-billing

            # Install Python if not exists
            sudo yum install python3 -y

            # Install dependencies
            pip3 install -r requirements.txt

            # Stop old app if running
            pkill -f app.py || true

            # Run app in background
            nohup python3 app.py > output.log 2>&1 &
          EOF
