<!DOCTYPE html>
<html>
<head>
    <title>Billing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Supermarket Billing</h1>

<div class="bill">
    <p>Customer: {{ bill.customer.name }}</p>
    <p>Product: {{ bill.product.name }}</p>
    <p>Price: {{ bill.product.price }}</p>
    <p>Quantity: {{ bill.quantity }}</p>
    <h2>Total: {{ bill.total_amount }}</h2>
</div>

</body>
</html>
